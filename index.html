<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=360, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Bounce FC</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  font-family:'Roboto',sans-serif;
  touch-action:none;
  user-select:none;
  overflow:hidden;
}
#wrap {
  position:relative;
  width:360px;
  height:640px;
  overflow:hidden;
}
canvas {
  position:absolute;
  top:0; left:0;
  display:block;
}
/* ── HEADER ── */
#header {
  position:absolute;
  top:0; left:0;
  width:360px; height:46px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 10px;
  background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent);
  z-index:20;
}
#btn-back {
  color:#fff;
  font-size:22px;
  cursor:pointer;
  background:none;
  border:none;
  line-height:1;
}
#wallet {
  position:relative;
  height:28px;
  width:88px;
  cursor:pointer;
}
#wallet-bg {
  position:absolute;
  inset:0;
  width:100%; height:100%;
  object-fit:fill;
}
#wallet-outline {
  position:absolute;
  inset:0;
  width:100%; height:100%;
  object-fit:fill;
}
#wallet-label {
  position:absolute;
  top:-1px; left:50%;
  transform:translateX(-50%);
  font-size:8px; font-weight:700;
  color:#fff; white-space:nowrap;
}
#wallet-amount {
  position:absolute;
  top:9px; left:50%;
  transform:translateX(-50%);
  font-size:12px; font-weight:500;
  color:#fff; white-space:nowrap;
}
#logo {
  font-size:16px; font-weight:700;
  color:#fff; white-space:nowrap;
}
#btn-menu {
  color:#fff; font-size:22px;
  background:none; border:none; cursor:pointer;
}
/* ── BANNER ── */
#banner {
  position:absolute;
  top:46px; left:0;
  width:360px;
  background:rgba(0,0,0,.55);
  color:#fff;
  font-size:14px; font-weight:700;
  text-align:center;
  padding:4px 0;
  z-index:20;
}
/* ── BOTTOM UI ── */
#bottom {
  position:absolute;
  bottom:0; left:0;
  width:360px;
  display:flex;
  flex-direction:column;
  z-index:20;
}
#bet-display {
  display:flex;
  gap:8px;
  align-items:center;
  justify-content:center;
  border:1px solid #fff;
  margin:0 auto 8px;
  padding:6px 16px;
  color:#fff;
  font-size:14px; font-weight:700;
}
#bet-display img.chip {
  width:16px; height:16px;
  vertical-align:middle;
}
/* Bet preset buttons */
#carry-label {
  text-align:center;
  color:#fff;
  font-size:14px; font-weight:700;
  margin-bottom:6px;
}
#bet-presets {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:5px;
  padding:0 12px;
  margin-bottom:8px;
}
.bet-btn {
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.35);
  color:#fff;
  font-size:12px; font-weight:700;
  padding:7px 0;
  border-radius:4px;
  cursor:pointer;
  transition:background .15s;
}
.bet-btn.active {
  background:#f33;
  border-color:#f33;
}
#action-btn {
  width:360px;
  height:54px;
  background:#f33;
  border:none;
  color:#fff;
  font-size:18px; font-weight:700;
  cursor:pointer;
  letter-spacing:.5px;
}
/* ── BREACH OVERLAY ── */
#breach {
  display:none;
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.88);
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  z-index:30;
}
#breach h1 {
  font-size:48px; font-weight:900;
  color:#f33; letter-spacing:2px;
  text-shadow:0 0 20px rgba(255,50,50,.8);
}
#breach .stat-row {
  color:#fff; font-size:15px; font-weight:500;
  text-align:center; line-height:1.8;
}
#breach .stat-row span { color:#ffd700; font-weight:700; }
#btn-siege {
  margin-top:8px;
  padding:14px 48px;
  background:#f33;
  border:none;
  color:#fff;
  font-size:18px; font-weight:700;
  border-radius:4px;
  cursor:pointer;
}
/* popups rendered on canvas — no DOM class needed */
</style>
</head>
<body>
<div id="wrap">
  <canvas id="canvas" width="360" height="640"></canvas>

  <!-- Foreground castle frame — sits above canvas, below UI, transparent center -->
  <img id="fg-frame" src="images/castle-frame.png"
       style="position:absolute;top:0;left:0;width:360px;height:640px;pointer-events:none;z-index:10;" alt="">

  <!-- Header -->
  <div id="header">
    <button id="btn-back">‹</button>
    <div id="wallet">
      <img id="wallet-bg"      src="images/wallet-bg.png" alt="">
      <img id="wallet-outline" src="images/wallet-outline.png" alt="">
      <div id="wallet-label">NGN</div>
      <div id="wallet-amount">10,000.00</div>
    </div>
    <div id="logo">Bounce FC</div>
    <button id="btn-menu">≡</button>
  </div>

  <!-- Event banner -->
  <div id="banner">Ready</div>

  <!-- Bottom controls -->
  <div id="bottom">
    <!-- Bet-screen extras -->
    <div id="carry-label">Carry Your Bullets</div>
    <div id="bet-presets">
      <button class="bet-btn" data-idx="0">10</button>
      <button class="bet-btn active" data-idx="1">50</button>
      <button class="bet-btn" data-idx="2">100</button>
      <button class="bet-btn" data-idx="3">200</button>
      <button class="bet-btn" data-idx="4">500</button>
      <button class="bet-btn" data-idx="5">1K</button>
      <button class="bet-btn" data-idx="6">2K</button>
      <button class="bet-btn" data-idx="7">5K</button>
    </div>
    <!-- Always visible -->
    <div id="bet-display">
      <span>Bet</span>
      <img class="chip" src="images/chip.png" alt="">
      <span id="bet-value">50</span>
    </div>
    <button id="action-btn">BET</button>
  </div>

  <!-- Breach overlay -->
  <div id="breach">
    <h1>BREACH!</h1>
    <div class="stat-row">
      Shots fired: <span id="stat-shots">0</span><br>
      Kills: <span id="stat-kills">0</span><br>
      NGN spent: <span id="stat-spent">0</span><br>
      NGN earned: <span id="stat-earned">0</span>
    </div>
    <button id="btn-siege">⚔ SIEGE AGAIN</button>
  </div>
</div>

<script src="js/spine-canvas.js"></script>
<script src="js/config.js"></script>
<script src="js/render.js"></script>
<script src="js/game.js"></script>
</body>
</html>
